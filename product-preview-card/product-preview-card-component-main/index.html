<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
  <article class="product-box">
    <picture>
      <source media="(min-width: 768px)" srcset="./images/image-product-desktop.jpg"/>
      <img class="product-box__image" src="./images/image-product-mobile.jpg" alt="main product image "/>
    </picture>

    <div class="product-box-content">
      <p class="product-box-content__type-text text-preset-4">Perfume</p>
      <p class="product-box-content__title text-preset-1">Gabrielle Essence Eau De Parfum</p>
      <p class="product-box-content__description text-preset-3">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
    Perfumer-Creator for the House of CHANEL.</p>
      <p class="product-box__price">
        <span class="price--active text-preset-1">$149.99</span>
        <span class="price--cut-off text-preset-5">$169.99</span>
      </p>
      <button class="product-box-atc">
        <img class="product-box-atc__image" src="./images/icon-cart.svg" alt="cart icon"/>
        <span class="product-box-atc__text text-preset-2">Add to Cart</span>
      </button>
    </div>

  </article>
</body>
</html>
